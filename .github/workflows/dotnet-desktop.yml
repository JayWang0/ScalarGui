name: .NET Desktop

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOTNET_VERSION: 8.0.x
  CONFIGURATION: Release
  PROJECT_PATH: ScalarGui.csproj
  RUNTIME: win-x64

jobs:
  build:
    name: Build WPF app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH --runtime $env:RUNTIME

      - name: Build
        run: dotnet build $env:PROJECT_PATH --configuration $env:CONFIGURATION --no-restore

      - name: Publish
        run: dotnet publish $env:PROJECT_PATH --configuration $env:CONFIGURATION --runtime $env:RUNTIME --self-contained false --no-restore --output "$env:RUNNER_TEMP\publish"

      - name: Upload published app
        uses: actions/upload-artifact@v7
        with:
          name: ScalarGui-win-x64
          path: ${{ runner.temp }}\publish
          if-no-files-found: error
          retention-days: 14
